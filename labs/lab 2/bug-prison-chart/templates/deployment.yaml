apiVersion: apps/v1
kind: Deployment

metadata:
  name: bug-prison

spec:

  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: bug-prison

  template:

    metadata:
      labels:
        app: bug-prison

    spec:

      containers:

      - name: nginx

        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

        ports:
        - containerPort: 80


        volumeMounts:

        - name: html
          mountPath: /usr/share/nginx/html


      volumes:

      - name: html

        configMap:

          name: bug-prison-page